global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "swarm-api"
    metrics_path: /api/v1/health/metrics
    static_configs:
      - targets: ["api:8000"]

